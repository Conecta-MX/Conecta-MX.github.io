<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requisición de Personal — Conecta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal: #0D6B5E;
  --teal-mid: #1A8A7A;
  --teal-light: #E6F4F2;
  --teal-pale: #F2FAF9;
  --accent: #00C49A;
  --dark: #0F1C1A;
  --gray-1: #2A3B38;
  --gray-2: #5A706C;
  --gray-3: #A8BCBA;
  --gray-4: #D4E5E3;
  --gray-5: #EEF6F5;
  --white: #FFFFFF;
  --red: #E53935;
  --green: #1B8A5A;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}

@media print {
  body { background: white; }
  .page { box-shadow: none; }
  .no-print { display: none !important; }
  .section { break-inside: avoid; }
}

body {
  font-family: var(--font);
  background: #E8F4F2;
  min-height: 100vh;
  padding: 32px 16px 64px;
  color: var(--dark);
}

.toolbar {
  max-width: 820px;
  margin: 0 auto 20px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-wrap: wrap;
}

.btn {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 20px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all .18s;
  letter-spacing: .02em;
}
.btn-send { background: var(--accent); color: white; }
.btn-send:hover { background: #00a882; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,196,154,.35); }
.btn-send:disabled { background: var(--gray-3); cursor: not-allowed; transform: none; box-shadow: none; }

.page {
  max-width: 820px;
  margin: 0 auto;
  background: var(--white);
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(13,107,94,.12), 0 2px 8px rgba(0,0,0,.06);
  overflow: hidden;
}

/* ── HEADER ── */
.doc-header {
  background: linear-gradient(135deg, var(--teal) 0%, #0A4F45 100%);
  padding: 36px 48px 28px;
  position: relative;
  overflow: hidden;
}
.doc-header::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px; border-radius: 50%;
  background: rgba(255,255,255,.06);
}
.doc-header::after {
  content: '';
  position: absolute; bottom: -20px; left: 160px;
  width: 100px; height: 100px; border-radius: 50%;
  background: rgba(0,196,154,.1);
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.logo-mark { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 44px; height: 44px; background: rgba(255,255,255,.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.logo-text { font-size: 22px; font-weight: 700; color: white; letter-spacing: .08em; text-transform: uppercase; }
.doc-id { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.5); letter-spacing: .06em; }
.doc-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,.65); text-transform: uppercase; letter-spacing: .14em; margin-bottom: 4px; }
.doc-headline { font-size: 28px; font-weight: 700; color: white; letter-spacing: -.01em; line-height: 1.1; }
.accent-bar { width: 48px; height: 3px; background: var(--accent); border-radius: 2px; margin-top: 12px; }

/* ── BODY ── */
.doc-body { padding: 0 48px 48px; }

/* ── SECTION ── */
.section { margin-top: 36px; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.section-num { width: 26px; height: 26px; border-radius: 50%; background: var(--teal); color: white; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.section-title { font-size: 11px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: .16em; flex: 1; }
.section-line { flex: 1; height: 1px; background: var(--gray-4); }

/* ── GRID ── */
.grid { display: grid; gap: 14px; }
.grid-2 { grid-template-columns: 1fr 1fr; }

/* ── FIELD ── */
.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: 1 / -1; }
label { font-size: 10.5px; font-weight: 600; color: var(--gray-2); text-transform: uppercase; letter-spacing: .1em; display: flex; align-items: center; gap: 3px; }
label .req { color: var(--red); font-size: 11px; }

input[type="text"],
input[type="date"],
input[type="number"],
textarea,
select {
  font-family: var(--font); font-size: 14px; color: var(--dark);
  background: var(--gray-5); border: 1.5px solid var(--gray-4);
  border-radius: 8px; padding: 10px 14px; outline: none;
  transition: all .15s; width: 100%; -webkit-appearance: none;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--teal-mid); background: white;
  box-shadow: 0 0 0 3px rgba(26,138,122,.12);
}
textarea { resize: vertical; min-height: 80px; }

/* ── RADIO GROUPS ── */
.radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
.radio-pill { position: relative; }
.radio-pill input { display: none; }
.radio-pill label {
  font-size: 12.5px; font-weight: 500; color: var(--gray-1);
  text-transform: none; letter-spacing: 0;
  padding: 8px 14px; border-radius: 100px;
  border: 1.5px solid var(--gray-4); background: var(--white);
  cursor: pointer; transition: all .15s; user-select: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.radio-pill label::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid var(--gray-3); flex-shrink: 0; transition: all .15s;
}
.radio-pill input:checked + label { background: var(--teal-light); border-color: var(--teal-mid); color: var(--teal); font-weight: 600; }
.radio-pill input:checked + label::before { background: var(--teal-mid); border-color: var(--teal-mid); box-shadow: inset 0 0 0 2px white; }
.radio-pill label:hover { border-color: var(--gray-3); background: var(--gray-5); }

/* ── DIVIDER ── */
.divider { border: none; border-top: 1px dashed var(--gray-4); margin: 28px 0; }

/* ── SIGNATURES ── */
.signatures { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-top: 40px; }
.sig-block { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.sig-line { width: 100%; height: 52px; border-bottom: 1.5px solid var(--gray-3); }
.sig-label { font-size: 10px; font-weight: 600; color: var(--gray-2); text-transform: uppercase; letter-spacing: .1em; text-align: center; }

/* ── FOOTER ── */
.doc-footer {
  background: var(--gray-5); border-top: 1px solid var(--gray-4);
  padding: 14px 48px; display: flex; align-items: center;
  justify-content: space-between; margin-top: 40px;
}
.footer-text { font-family: var(--mono); font-size: 10px; color: var(--gray-3); letter-spacing: .05em; }

/* ══════════════════════════════════════
   BANNER DE ÉXITO
══════════════════════════════════════ */
#success-banner {
  display: none;
  max-width: 820px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, #1B8A5A 0%, #0D6B5E 100%);
  border-radius: 14px;
  padding: 22px 28px;
  color: white;
  align-items: center;
  gap: 18px;
  box-shadow: 0 8px 32px rgba(13,107,94,.3);
  animation: slideDown .4s cubic-bezier(.34,1.56,.64,1);
}
#success-banner.visible { display: flex; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.success-icon {
  width: 48px; height: 48px; flex-shrink: 0;
  background: rgba(255,255,255,.2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.success-body { flex: 1; }
.success-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.success-sub { font-size: 13px; opacity: .85; line-height: 1.45; }
.success-close {
  background: rgba(255,255,255,.2); border: none; color: white;
  cursor: pointer; width: 30px; height: 30px; border-radius: 50%;
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s;
}
.success-close:hover { background: rgba(255,255,255,.35); }

/* ── TOAST DE ERROR ── */
#toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--red); color: white;
  padding: 14px 24px; border-radius: 12px;
  font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,.25);
  z-index: 9999; opacity: 0;
  transition: all .35s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; max-width: 90vw;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SPINNER ── */
.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: white; border-radius: 50%;
  animation: spin .7s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  body { padding: 16px 8px 40px; }
  .doc-header, .doc-body { padding-left: 24px; padding-right: 24px; }
  .doc-footer { padding: 12px 24px; }
  .grid-2 { grid-template-columns: 1fr; }
  .signatures { grid-template-columns: 1fr; }
  .doc-headline { font-size: 22px; }
  #success-banner { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>

<!-- BANNER DE ÉXITO -->
<div id="success-banner">
  <div class="success-icon">✅</div>
  <div class="success-body">
    <div class="success-title">¡Requisición enviada correctamente!</div>
    <div class="success-sub" id="success-sub"></div>
  </div>
  <button class="success-close" onclick="cerrarBanner()">✕</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar no-print">
  <button class="btn btn-send" id="btn-enviar" onclick="enviarFormulario()">
    <span id="btn-icon">📤</span>
    <span id="btn-text">Enviar Requisición</span>
  </button>
</div>

<div class="page">

  <!-- ENCABEZADO -->
  <div class="doc-header">
    <div class="header-top">
      <div class="logo-mark">
        <div class="logo-icon">🏢</div>
        <div class="logo-text">Conecta</div>
      </div>
      <div class="doc-id">RH-REQ-001</div>
    </div>
    <div class="doc-title">Recursos Humanos</div>
    <div class="doc-headline">Requisición de Personal</div>
    <div class="accent-bar"></div>
  </div>

  <div class="doc-body">

    <!-- ════ SECCIÓN 1 ════ -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">1</div>
        <div class="section-title">Datos Generales de la Requisición</div>
        <div class="section-line"></div>
      </div>
      <div class="grid grid-2">
        <div class="field">
          <label>Líder de Equipo <span class="req">*</span></label>
          <input type="text" id="lider" placeholder="Nombre completo">
        </div>
        <div class="field">
          <label>Fecha de Solicitud <span class="req">*</span></label>
          <input type="date" id="fecha_solicitud">
        </div>
        <div class="field full">
          <label>Puesto Solicitado <span class="req">*</span></label>
          <div class="radio-group">
            <div class="radio-pill"><input type="radio" name="puesto" id="p1" value="Agente Telefónico"><label for="p1">Agente Telefónico</label></div>
            <div class="radio-pill"><input type="radio" name="puesto" id="p2" value="Supervisor"><label for="p2">Supervisor</label></div>
            <div class="radio-pill"><input type="radio" name="puesto" id="p3" value="Capacitador"><label for="p3">Capacitador</label></div>
            <div class="radio-pill"><input type="radio" name="puesto" id="p4" value="Coordinador"><label for="p4">Coordinador</label></div>
            <div class="radio-pill"><input type="radio" name="puesto" id="p5" value="Gerente"><label for="p5">Gerente</label></div>
          </div>
        </div>
        <div class="field full">
          <label>Área / Campaña <span class="req">*</span></label>
          <div class="radio-group">
            <div class="radio-pill"><input type="radio" name="area" id="a1" value="Ventas"><label for="a1">Ventas</label></div>
            <div class="radio-pill"><input type="radio" name="area" id="a2" value="Cobranza"><label for="a2">Cobranza</label></div>
            <div class="radio-pill"><input type="radio" name="area" id="a3" value="Atención al Cliente"><label for="a3">Atención al Cliente</label></div>
          </div>
        </div>
        <div class="field">
          <label>Número de Vacantes <span class="req">*</span></label>
          <input type="number" id="vacantes" min="1" placeholder="Ej: 3">
        </div>
        <div class="field">
          <label>Motivo de Requisición <span class="req">*</span></label>
          <div class="radio-group">
            <div class="radio-pill"><input type="radio" name="motivo" id="m1" value="Reemplazo"><label for="m1">Reemplazo</label></div>
            <div class="radio-pill"><input type="radio" name="motivo" id="m2" value="Crecimiento de Campaña"><label for="m2">Crecimiento de Campaña</label></div>
            <div class="radio-pill"><input type="radio" name="motivo" id="m3" value="Temporal"><label for="m3">Temporal</label></div>
          </div>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- ════ SECCIÓN 2 ════ -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">2</div>
        <div class="section-title">Perfil de Puesto</div>
        <div class="section-line"></div>
      </div>
      <div class="grid grid-2">
        <div class="field">
          <label>Edad Máxima <span class="req">*</span></label>
          <input type="number" id="edad_maxima" min="18" max="70" placeholder="Ej: 45">
        </div>
        <div class="field">
          <label>Escolaridad Mínima <span class="req">*</span></label>
          <div class="radio-group">
            <div class="radio-pill"><input type="radio" name="escolaridad" id="e1" value="Bachillerato Estudiante"><label for="e1">Bachillerato Estudiante</label></div>
            <div class="radio-pill"><input type="radio" name="escolaridad" id="e2" value="Bachillerato Concluido"><label for="e2">Bachillerato Concluido</label></div>
            <div class="radio-pill"><input type="radio" name="escolaridad" id="e3" value="Licenciatura"><label for="e3">Licenciatura</label></div>
          </div>
        </div>
        <div class="field">
          <label>Experiencia Requerida</label>
          <input type="text" id="experiencia" placeholder="Ej: 6 meses en call center">
        </div>
        <div class="field">
          <label>Habilidades Clave</label>
          <input type="text" id="habilidades" placeholder="Ej: Comunicación, negociación...">
        </div>
        <div class="field full">
          <label>Descripción del Puesto</label>
          <textarea id="descripcion_puesto" placeholder="Describe las principales actividades y responsabilidades del puesto..."></textarea>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- ════ SECCIÓN 3 ════ -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">3</div>
        <div class="section-title">Condiciones Laborales</div>
        <div class="section-line"></div>
      </div>
      <div class="grid grid-2">
        <div class="field">
          <label>Días a Laborar <span class="req">*</span></label>
          <div class="radio-group">
            <div class="radio-pill"><input type="radio" name="dias" id="d1" value="Lunes a Viernes"><label for="d1">Lunes a Viernes</label></div>
            <div class="radio-pill"><input type="radio" name="dias" id="d2" value="Lunes a Sábado"><label for="d2">Lunes a Sábado</label></div>
          </div>
        </div>
        <div class="field">
          <label>Turno Requerido <span class="req">*</span></label>
          <div class="radio-group">
            <div class="radio-pill"><input type="radio" name="turno" id="t1" value="Matutino"><label for="t1">Matutino</label></div>
            <div class="radio-pill"><input type="radio" name="turno" id="t2" value="Vespertino"><label for="t2">Vespertino</label></div>
            <div class="radio-pill"><input type="radio" name="turno" id="t3" value="Completo"><label for="t3">Completo</label></div>
          </div>
        </div>
        <div class="field">
          <label>Salario Ofertado</label>
          <input type="text" id="salario" placeholder="Ej: $8,500 mensual">
        </div>
        <div class="field">
          <label>Fecha de Ingreso Estimada</label>
          <input type="date" id="fecha_ingreso">
        </div>
        <div class="field full">
          <label>Observaciones</label>
          <textarea id="observaciones" placeholder="Cualquier información adicional relevante para esta requisición..."></textarea>
        </div>
      </div>
    </div>

  </div><!-- /doc-body -->

  <div class="doc-footer">
    <span class="footer-text">CONECTA — RH-001</span>
    <span class="footer-text">CONFIDENCIAL</span>
    <span class="footer-text" id="fecha-footer"></span>
  </div>

</div><!-- /page -->

<!-- TOAST DE ERROR -->
<div id="toast"></div>

<script>
  // Fecha footer
  const hoy = new Date();
  document.getElementById('fecha-footer').textContent =
    hoy.toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });

  // Toast de error
  function showToast(msg, duracion = 4000) {
    const t = document.getElementById('toast');
    t.className = 'show';
    t.innerHTML = msg;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, duracion);
  }

  // Banner de éxito
  function mostrarBanner(lider, puesto) {
    document.getElementById('success-sub').textContent =
      `La requisición de "${puesto}" solicitada por ${lider} fue registrada exitosamente. El formulario ha sido limpiado y está listo para una nueva solicitud.`;
    document.getElementById('success-banner').classList.add('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cerrarBanner() {
    document.getElementById('success-banner').classList.remove('visible');
  }

  // Leer radio
  function getRadio(name) {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : '';
  }

  // Validación
  function validar() {
    const campos = [
      { val: document.getElementById('lider').value.trim(),    label: 'Líder de Equipo' },
      { val: document.getElementById('fecha_solicitud').value, label: 'Fecha de Solicitud' },
      { val: document.getElementById('vacantes').value,        label: 'Número de Vacantes' },
      { val: document.getElementById('edad_maxima').value,     label: 'Edad Máxima' },
      { val: getRadio('puesto'),                               label: 'Puesto Solicitado' },
      { val: getRadio('area'),                                 label: 'Área / Campaña' },
      { val: getRadio('motivo'),                               label: 'Motivo de Requisición' },
      { val: getRadio('escolaridad'),                          label: 'Escolaridad Mínima' },
      { val: getRadio('dias'),                                 label: 'Días a Laborar' },
      { val: getRadio('turno'),                                label: 'Turno Requerido' },
    ];
    for (const c of campos) { if (!c.val) return c.label; }
    return null;
  }

  // Limpiar formulario
  function limpiarFormulario() {
    document.querySelectorAll('input[type="text"], input[type="date"], input[type="number"], textarea, select')
      .forEach(el => el.value = '');
    document.querySelectorAll('input[type="radio"]')
      .forEach(el => el.checked = false);
  }

  // Envío a SheetDB
  async function enviarFormulario() {
    const faltante = validar();
    if (faltante) {
      showToast(`⚠️ &nbsp;Campo requerido: <strong>${faltante}</strong>`, 4000);
      return;
    }

    const btn     = document.getElementById('btn-enviar');
    const btnIcon = document.getElementById('btn-icon');
    const btnText = document.getElementById('btn-text');

    btn.disabled = true;
    btnIcon.innerHTML = '<span class="spinner"></span>';
    btnText.textContent = 'Enviando…';

    const lider  = document.getElementById('lider').value.trim();
    const puesto = getRadio('puesto');

    const datos = {
      lider_equipo:       lider,
      fecha_solicitud:    document.getElementById('fecha_solicitud').value,
      puesto_solicitado:  puesto,
      area_campana:       getRadio('area'),
      num_vacantes:       document.getElementById('vacantes').value,
      motivo_requisicion: getRadio('motivo'),
      edad_maxima:        document.getElementById('edad_maxima').value,
      escolaridad_minima: getRadio('escolaridad'),
      experiencia:        document.getElementById('experiencia').value.trim(),
      habilidades_clave:  document.getElementById('habilidades').value.trim(),
      descripcion_puesto: document.getElementById('descripcion_puesto').value.trim(),
      dias_laborar:       getRadio('dias'),
      turno_requerido:    getRadio('turno'),
      salario_ofertado:   document.getElementById('salario').value.trim(),
      fecha_ingreso:      document.getElementById('fecha_ingreso').value,
      observaciones:      document.getElementById('observaciones').value.trim(),
      fecha_envio:        new Date().toLocaleString('es-MX'),
    };

    try {
      const res = await fetch('https://sheetdb.io/api/v1/4rpu8qa7yjtvv', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: datos }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      limpiarFormulario();
      mostrarBanner(lider, puesto);

    } catch (err) {
      console.error(err);
      showToast('❌ &nbsp;Error al enviar. Revisa tu conexión e intenta de nuevo.', 5000);
    } finally {
      btnIcon.textContent = '📤';
      btnText.textContent = 'Enviar Requisición';
      btn.disabled = false;
    }
  }
</script>
